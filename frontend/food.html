<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProPOS — Business Edition</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  :root {
    --bg-base: #060608;
    --bg-card: #0d0d11;
    --bg-card2: #111116;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --accent3: #a78bfa;
    --green: #22c55e;
    --red: #ef4444;
    --border: rgba(255,255,255,0.07);
    --border-accent: rgba(0,229,255,0.25);
    --text-primary: #f0f0f5;
    --text-muted: #5a5a70;
    --text-sub: #8888aa;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --font-bengali: 'Noto Sans Bengali', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: var(--font-bengali);
    overflow: hidden;
  }

  /* ─── Scrollbar ─── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.3); border-radius: 99px; }

  /* ─── Header ─── */
  #header {
    height: 62px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: rgba(6,6,8,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .logo-mark {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px rgba(0,229,255,0.4);
  }
  .logo-icon i { color: #000; font-size: 15px; }
  .logo-text {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--accent); }

  .header-actions { display: flex; gap: 10px; align-items: center; }

  .hbtn {
    height: 38px;
    padding: 0 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-primary);
    font-family: var(--font-bengali);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 7px;
    transition: all 0.2s;
  }
  .hbtn:hover { border-color: var(--accent); color: var(--accent); }
  .hbtn.danger:hover { border-color: var(--red); color: var(--red); }
  .hbtn i { font-size: 12px; }

  /* ─── Layout ─── */
  #layout {
    height: calc(100vh - 62px - 70px);
    display: flex;
    overflow: hidden;
  }

  /* ─── Sidebar Summary ─── */
  #sidebar {
    width: 260px;
    min-width: 260px;
    border-right: 1px solid var(--border);
    background: var(--bg-card);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 18px 18px 14px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header h3 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-sub);
  }
  .grand-total-block {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, rgba(0,229,255,0.05), transparent);
  }
  .grand-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .grand-amount {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .grand-amount span { font-size: 14px; margin-right: 3px; }

  #storeList {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .store-pill {
    padding: 10px 12px;
    border-radius: 10px;
    background: var(--bg-card2);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: space-between;
  }
  .store-pill:hover, .store-pill.active {
    border-color: var(--border-accent);
    background: rgba(0,229,255,0.05);
  }
  .store-pill-name { font-size: 13px; font-weight: 600; }
  .store-pill-total {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
  }

  /* ─── Main Store Area ─── */
  #storeContainer {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 20px;
    display: flex; flex-direction: column; gap: 22px;
  }

  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    color: var(--text-muted);
  }
  .empty-state i { font-size: 48px; opacity: 0.3; }
  .empty-state p { font-size: 14px; }

  /* ─── Store Card ─── */
  .store-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    position: relative;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .store-card-accent {
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }
  .store-card-accent.orange { background: var(--accent2); box-shadow: 0 0 12px var(--accent2); }
  .store-card-accent.purple { background: var(--accent3); box-shadow: 0 0 12px var(--accent3); }
  .store-card-accent.green  { background: var(--green);   box-shadow: 0 0 12px var(--green);  }

  .card-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 16px 18px 14px 22px;
    border-bottom: 1px solid var(--border);
  }
  .card-title { font-family: var(--font-display); font-weight: 700; font-size: 17px; }
  .card-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .card-actions { display: flex; gap: 6px; }
  .card-btn {
    height: 30px; padding: 0 12px; border-radius: 8px;
    border: 1px solid var(--border); background: transparent;
    font-size: 11px; font-weight: 600; cursor: pointer;
    color: var(--text-sub); transition: all 0.2s;
    display: flex; align-items: center; gap: 5px;
    font-family: var(--font-bengali);
  }
  .card-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .card-btn.del:hover { border-color: var(--red); color: var(--red); }

  /* ─── Receipt ─── */
  .receipt-zone {
    padding: 10px 18px 10px 22px;
    border-bottom: 1px solid var(--border);
  }
  .receipt-scroll {
    max-height: 200px;
    overflow-y: auto;
    background: rgba(0,0,0,0.25);
    border: 1px dashed rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px;
  }
  .receipt-empty {
    text-align: center; padding: 18px;
    font-size: 12px; color: var(--text-muted); font-style: italic;
  }
  .receipt-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    gap: 8px;
  }
  .receipt-row:last-child { border-bottom: none; }
  .rr-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .rr-remove {
    width: 22px; height: 22px; border-radius: 6px;
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
    color: var(--red); cursor: pointer; font-size: 9px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .rr-remove:hover { background: rgba(239,68,68,0.25); }
  .rr-name { font-size: 13px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rr-qty {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--accent); background: rgba(0,229,255,0.1);
    border: 1px solid rgba(0,229,255,0.2);
    padding: 1px 6px; border-radius: 5px; white-space: nowrap;
    flex-shrink: 0;
  }
  .rr-price {
    font-family: var(--font-mono); font-size: 13px; font-weight: 700;
    white-space: nowrap;
  }

  /* ─── Store Total ─── */
  .store-total-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 18px 10px 22px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,229,255,0.03);
  }
  .st-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .st-amount {
    font-family: var(--font-mono);
    font-size: 20px; font-weight: 700; color: var(--accent);
  }

  /* ─── Food Buttons Zone ─── */
  .food-zone { padding: 14px 18px 18px 22px; }
  .food-zone-title {
    font-size: 10px; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 1.5px; margin-bottom: 10px; font-family: var(--font-display);
  }
  .food-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 8px;
  }
  .food-btn {
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 8px;
    cursor: pointer;
    transition: all 0.18s;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    position: relative; overflow: hidden;
  }
  .food-btn:hover {
    border-color: rgba(0,229,255,0.3);
    background: rgba(0,229,255,0.06);
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.4);
  }
  .food-btn:active { transform: scale(0.95); }
  .food-btn-name { font-size: 11px; font-weight: 700; text-align: center; line-height: 1.3; }
  .food-btn-price {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--accent); font-weight: 600;
  }
  .food-btn.custom { border-color: rgba(167,139,250,0.3); }
  .food-btn.custom .food-btn-price { color: var(--accent3); }

  .add-food-btn {
    background: transparent;
    border: 1px dashed rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 10px 8px;
    cursor: pointer;
    transition: all 0.18s;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: var(--text-muted); font-size: 11px;
  }
  .add-food-btn:hover { border-color: var(--accent); color: var(--accent); }
  .add-food-btn i { font-size: 14px; }

  /* ─── Footer ─── */
  #footer {
    height: 70px;
    background: rgba(6,6,8,0.95);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    backdrop-filter: blur(20px);
  }
  .footer-stat { display: flex; flex-direction: column; }
  .footer-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 2px; }
  .footer-val {
    font-family: var(--font-mono); font-size: 22px; font-weight: 700; color: var(--accent);
  }
  .footer-val.secondary { font-size: 18px; color: var(--text-primary); }

  /* ─── Modals ─── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--bg-card);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 22px;
    padding: 28px;
    width: 100%; max-width: 400px;
    box-shadow: 0 0 60px rgba(0,229,255,0.1);
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0.88); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .modal-title {
    font-family: var(--font-display); font-weight: 700; font-size: 20px;
    display: flex; align-items: center; gap: 10px; margin-bottom: 22px;
  }
  .modal-title i { color: var(--accent); }

  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 12px 15px;
    border-radius: 12px;
    color: var(--text-primary);
    outline: none;
    transition: 0.2s;
    font-family: var(--font-bengali);
    font-size: 14px;
  }
  .form-input:focus {
    border-color: var(--accent);
    background: rgba(0,229,255,0.04);
    box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
  }
  .form-input::placeholder { color: var(--text-muted); }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-cancel {
    flex: 1; padding: 12px; border-radius: 12px;
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    color: var(--text-sub); cursor: pointer; font-family: var(--font-bengali);
    font-weight: 600; font-size: 14px; transition: all 0.2s;
  }
  .btn-cancel:hover { background: rgba(255,255,255,0.08); }
  .btn-confirm {
    flex: 1; padding: 12px; border-radius: 12px;
    background: var(--accent); border: none;
    color: #000; cursor: pointer; font-family: var(--font-bengali);
    font-weight: 700; font-size: 14px; transition: all 0.2s;
    box-shadow: 0 0 20px rgba(0,229,255,0.3);
  }
  .btn-confirm:hover { box-shadow: 0 0 30px rgba(0,229,255,0.5); transform: translateY(-1px); }

  /* ─── Quantity Popup ─── */
  #qtyOverlay {
    display: none; position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.9); backdrop-filter: blur(12px);
    align-items: center; justify-content: center; padding: 20px;
  }
  #qtyOverlay.open { display: flex; }
  .qty-box {
    background: var(--bg-card);
    border: 1px solid var(--border-accent);
    border-radius: 22px; padding: 28px;
    width: 100%; max-width: 340px;
    text-align: center;
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .qty-item-name {
    font-family: var(--font-display); font-size: 18px; font-weight: 700;
    margin-bottom: 6px;
  }
  .qty-price {
    font-family: var(--font-mono); color: var(--accent);
    font-size: 13px; margin-bottom: 20px;
  }
  .qty-controls { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 20px; }
  .qty-dec, .qty-inc {
    width: 44px; height: 44px; border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg-card2); color: var(--text-primary);
    font-size: 20px; cursor: pointer; transition: all 0.2s;
  }
  .qty-dec:hover { border-color: var(--red); color: var(--red); }
  .qty-inc:hover { border-color: var(--accent); color: var(--accent); }
  .qty-display {
    font-family: var(--font-mono); font-size: 36px; font-weight: 700;
    width: 80px; text-align: center;
    background: transparent; border: none;
    border-bottom: 2px solid var(--border-accent);
    color: var(--text-primary); outline: none;
    padding-bottom: 4px;
  }
  .qty-actions { display: flex; gap: 10px; }

  /* ─── Toast ─── */
  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--bg-card); border: 1px solid var(--border-accent);
    padding: 10px 20px; border-radius: 30px;
    font-size: 13px; font-weight: 600; color: var(--accent);
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    z-index: 500; opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* ─── Color Accents cycling ─── */
  .accent-colors { --c: var(--accent); }

  /* ─── Mobile ─── */
  @media (max-width: 680px) {
    #sidebar { display: none; }
    .food-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header id="header">
  <div class="logo-mark">
    <div class="logo-icon"><i class="fas fa-utensils"></i></div>
    <div class="logo-text">SYEDA<span> BULBUL AKTER</span></div>
  </div>
  <div class="header-actions">
    <button class="hbtn" onclick="openStoreModal()">
      <i class="fas fa-plus"></i> নতুন সেগমেন্ট
    </button>
    <button class="hbtn danger" onclick="clearAllData()">
      <i class="fas fa-trash"></i> সব মুছুন
    </button>
  </div>
</header>

<!-- ══ LAYOUT ══ -->
<div id="layout">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <h3>সারসংক্ষেপ</h3>
    </div>
    <div class="grand-total-block">
      <div class="grand-label">আজকের মোট বিক্রয়</div>
      <div class="grand-amount"><span>৳</span><span id="sideTotal">0</span></div>
    </div>
    <div id="storeList"></div>
  </aside>

  <!-- Main -->
  <main id="storeContainer"></main>
</div>

<!-- ══ FOOTER ══ -->
<footer id="footer">
  <div class="footer-stat">
    <span class="footer-label">মোট বিক্রয়</span>
    <span class="footer-val">৳<span id="grandTotal">0</span></span>
  </div>
  <div class="footer-stat" style="text-align:center;">
    <span class="footer-label">সক্রিয় সেগমেন্ট</span>
    <span class="footer-val secondary" id="storeCount">0</span>
  </div>
  <div class="footer-stat" style="text-align:right;">
    <span class="footer-label">মোট আইটেম</span>
    <span class="footer-val secondary" id="itemCount">0</span>
  </div>
</footer>

<!-- ══ STORE MODAL ══ -->
<div class="modal-overlay" id="storeModal">
  <div class="modal-box">
    <div class="modal-title"><i class="fas fa-store"></i> নতুন সেগমেন্ট তৈরি</div>
    <div class="form-group">
      <label class="form-label">সেগমেন্ট নাম</label>
      <input id="storeName" class="form-input" type="text" placeholder="যেমন: কাউন্টার ১, VIP হল...">
    </div>
    <div class="form-group">
      <label class="form-label">বিবরণ / ফোন</label>
      <input id="storeDesc" class="form-input" type="text" placeholder="ঐচ্ছিক...">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeStoreModal()">বাতিল</button>
      <button class="btn-confirm" onclick="saveStore()">তৈরি করুন</button>
    </div>
  </div>
</div>

<!-- ══ ADD FOOD ITEM MODAL ══ -->
<div class="modal-overlay" id="foodModal">
  <div class="modal-box">
    <div class="modal-title"><i class="fas fa-hamburger"></i> নতুন আইটেম যোগ</div>
    <div class="form-group">
      <label class="form-label">আইটেমের নাম</label>
      <input id="foodName" class="form-input" type="text" placeholder="যেমন: চিকেন বার্গার, চা...">
    </div>
    <div class="form-group">
      <label class="form-label">একক মূল্য (৳)</label>
      <input id="foodPrice" class="form-input" type="number" placeholder="যেমন: 120" min="0">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeFoodModal()">বাতিল</button>
      <button class="btn-confirm" onclick="saveFoodItem()">যোগ করুন</button>
    </div>
  </div>
</div>

<!-- ══ QUANTITY POPUP ══ -->
<div id="qtyOverlay">
  <div class="qty-box">
    <div class="qty-item-name" id="qtyItemName">—</div>
    <div class="qty-price" id="qtyItemPrice">৳0</div>
    <div class="qty-controls">
      <button class="qty-dec" onclick="changeQty(-1)">−</button>
      <input class="qty-display" id="qtyInput" type="number" value="1" min="1">
      <button class="qty-inc" onclick="changeQty(1)">+</button>
    </div>
    <div class="qty-actions">
      <button class="btn-cancel" onclick="closeQty()">বাতিল</button>
      <button class="btn-confirm" onclick="confirmQty()">যোগ করুন</button>
    </div>
  </div>
</div>

<!-- ══ TOAST ══ -->
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════
   DATA LAYER — localStorage persisted
═══════════════════════════════════════════════ */
const STORAGE_KEY = 'propos_v3';
let db = [];

function loadDB() {
  try { db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { db = []; }
}
function saveDB() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
}

/* ═══════════════════════════════════════════════
   ACCENT COLORS (cycling per store)
═══════════════════════════════════════════════ */
const ACCENT_CLASSES = ['', 'orange', 'purple', 'green'];
function accentClass(idx) { return ACCENT_CLASSES[idx % ACCENT_CLASSES.length]; }

/* ═══════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════ */
function render() {
  const container = document.getElementById('storeContainer');
  const storeList = document.getElementById('storeList');
  container.innerHTML = '';
  storeList.innerHTML = '';

  let grandTotal = 0;
  let totalItems = 0;

  if (db.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-store-slash"></i>
        <p>কোনো সেগমেন্ট নেই। উপরে "+ নতুন সেগমেন্ট" ক্লিক করুন।</p>
      </div>`;
  }

  db.forEach((store, sIdx) => {
    const storeTotal = store.items.reduce((s, it) => s + it.p * it.q, 0);
    grandTotal += storeTotal;
    totalItems += store.items.reduce((s, it) => s + it.q, 0);
    const ac = accentClass(sIdx);

    // ── Sidebar pill ──
    const pill = document.createElement('div');
    pill.className = 'store-pill';
    pill.innerHTML = `<span class="store-pill-name">${store.name}</span><span class="store-pill-total">৳${storeTotal.toLocaleString()}</span>`;
    pill.onclick = () => {
      document.getElementById(`card-${sIdx}`)?.scrollIntoView({ behavior:'smooth', block:'start' });
    };
    storeList.appendChild(pill);

    // ── Store card ──
    const card = document.createElement('div');
    card.className = 'store-card';
    card.id = `card-${sIdx}`;

    const foodBtns = store.menu.map((m, mIdx) => `
      <button class="food-btn" onclick="openQty(${sIdx},${mIdx})">
        <span class="food-btn-name">${m.n}</span>
        <span class="food-btn-price">৳${m.p}</span>
      </button>`).join('');

    const receiptRows = store.items.length === 0
      ? `<div class="receipt-empty">কোনো অর্ডার নেই</div>`
      : store.items.map((it, iIdx) => `
          <div class="receipt-row">
            <div class="rr-left">
              <button class="rr-remove" onclick="removeItem(${sIdx},${iIdx})" title="সরান">
                <i class="fas fa-times"></i>
              </button>
              <span class="rr-name">${it.n}</span>
              <span class="rr-qty">×${it.q}</span>
            </div>
            <span class="rr-price">৳${(it.p * it.q).toLocaleString()}</span>
          </div>`).join('');

    card.innerHTML = `
      <div class="store-card-accent ${ac}"></div>

      <div class="card-header">
        <div>
          <div class="card-title">${store.name}</div>
          ${store.desc ? `<div class="card-desc">${store.desc}</div>` : ''}
        </div>
        <div class="card-actions">
          <button class="card-btn" onclick="clearReceipt(${sIdx})"><i class="fas fa-eraser"></i> রিসেট</button>
          <button class="card-btn del" onclick="deleteStore(${sIdx})"><i class="fas fa-trash-alt"></i></button>
        </div>
      </div>

      <div class="receipt-zone">
        <div class="receipt-scroll">${receiptRows}</div>
      </div>

      <div class="store-total-bar">
        <span class="st-label">সাব-টোটাল</span>
        <span class="st-amount">৳${storeTotal.toLocaleString()}</span>
      </div>

      <div class="food-zone">
        <div class="food-zone-title">মেনু আইটেম</div>
        ${store.menu.length === 0 ? `<p style="font-size:12px;color:var(--text-muted);margin-bottom:10px;font-style:italic;">কোনো আইটেম নেই — নিচের বোতামে যোগ করুন</p>` : ''}
        <div class="food-grid">
          ${foodBtns}
          <button class="add-food-btn" onclick="openFoodModal(${sIdx})">
            <i class="fas fa-plus"></i>
            <span>নতুন আইটেম</span>
          </button>
        </div>
      </div>
    `;

    container.appendChild(card);
  });

  // Footer
  document.getElementById('grandTotal').textContent = grandTotal.toLocaleString();
  document.getElementById('sideTotal').textContent = grandTotal.toLocaleString();
  document.getElementById('storeCount').textContent = db.length;
  document.getElementById('itemCount').textContent = totalItems;

  saveDB();
}

/* ═══════════════════════════════════════════════
   STORE CRUD
═══════════════════════════════════════════════ */
const DEFAULT_MENU = [];

function openStoreModal() { document.getElementById('storeModal').classList.add('open'); setTimeout(()=>document.getElementById('storeName').focus(),100); }
function closeStoreModal() { document.getElementById('storeModal').classList.remove('open'); document.getElementById('storeName').value=''; document.getElementById('storeDesc').value=''; }

function saveStore() {
  const name = document.getElementById('storeName').value.trim();
  const desc = document.getElementById('storeDesc').value.trim();
  if (!name) { showToast('নাম দিন!'); return; }
  db.push({ name, desc, items: [], menu: JSON.parse(JSON.stringify(DEFAULT_MENU)) });
  closeStoreModal();
  render();
  showToast(`"${name}" তৈরি হয়েছে ✓`);
}

function deleteStore(sIdx) {
  if (!confirm(`"${db[sIdx].name}" সেগমেন্ট মুছবেন?`)) return;
  db.splice(sIdx, 1);
  render();
}

function clearReceipt(sIdx) {
  if (!confirm(`"${db[sIdx].name}" এর রিসিপ্ট মুছবেন?`)) return;
  db[sIdx].items = [];
  render();
  showToast('রিসিপ্ট মুছা হয়েছে');
}

function clearAllData() {
  if (!confirm('সতর্কতা: আজকের সব ডাটা মুছে যাবে! নিশ্চিত?')) return;
  db = [];
  render();
  showToast('সব ডাটা মুছা হয়েছে');
}

/* ═══════════════════════════════════════════════
   FOOD ITEM CRUD
═══════════════════════════════════════════════ */
let _activeFoodStore = null;

function openFoodModal(sIdx) {
  _activeFoodStore = sIdx;
  document.getElementById('foodModal').classList.add('open');
  setTimeout(()=>document.getElementById('foodName').focus(), 100);
}
function closeFoodModal() {
  document.getElementById('foodModal').classList.remove('open');
  document.getElementById('foodName').value = '';
  document.getElementById('foodPrice').value = '';
  _activeFoodStore = null;
}

function saveFoodItem() {
  const name  = document.getElementById('foodName').value.trim();
  const price = parseFloat(document.getElementById('foodPrice').value);
  if (!name) { showToast('আইটেমের নাম দিন!'); return; }
  if (isNaN(price) || price < 0) { showToast('সঠিক মূল্য দিন!'); return; }
  db[_activeFoodStore].menu.push({ n:name, p:price });
  closeFoodModal();
  render();
  showToast(`"${name}" মেনুতে যোগ হয়েছে ✓`);
}

/* ═══════════════════════════════════════════════
   QUANTITY POPUP
═══════════════════════════════════════════════ */
let _qtyStore = null;
let _qtyMenuIdx = null;

function openQty(sIdx, mIdx) {
  _qtyStore = sIdx;
  _qtyMenuIdx = mIdx;
  const m = db[sIdx].menu[mIdx];
  document.getElementById('qtyItemName').textContent = m.n;
  document.getElementById('qtyItemPrice').textContent = `প্রতি পিস: ৳${m.p}`;
  document.getElementById('qtyInput').value = 1;
  document.getElementById('qtyOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('qtyInput').select(), 100);
}

function closeQty() {
  document.getElementById('qtyOverlay').classList.remove('open');
  _qtyStore = null; _qtyMenuIdx = null;
}

function changeQty(delta) {
  const inp = document.getElementById('qtyInput');
  let v = parseInt(inp.value) || 1;
  v = Math.max(1, v + delta);
  inp.value = v;
}

function confirmQty() {
  const qty = parseInt(document.getElementById('qtyInput').value);
  if (isNaN(qty) || qty <= 0) { showToast('সঠিক পরিমাণ দিন!'); return; }
  const store = db[_qtyStore];
  const m = store.menu[_qtyMenuIdx];
  const existing = store.items.find(i => i.n === m.n);
  if (existing) { existing.q += qty; }
  else { store.items.push({ n:m.n, p:m.p, q:qty }); }
  closeQty();
  render();
  showToast(`${m.n} ×${qty} যোগ হয়েছে ✓`);
}

/* ═══════════════════════════════════════════════
   RECEIPT ITEM REMOVE
═══════════════════════════════════════════════ */
function removeItem(sIdx, iIdx) {
  db[sIdx].items.splice(iIdx, 1);
  render();
}

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
let _toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ═══════════════════════════════════════════════
   KEYBOARD SHORTCUTS
═══════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeStoreModal(); closeFoodModal(); closeQty();
  }
  if (e.key === 'Enter') {
    if (document.getElementById('storeModal').classList.contains('open')) saveStore();
    if (document.getElementById('foodModal').classList.contains('open')) saveFoodItem();
    if (document.getElementById('qtyOverlay').classList.contains('open')) confirmQty();
  }
});

/* ═══════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════ */
loadDB();
render();
</script>
</body>
</html>
